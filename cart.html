<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - SS Tools Hub</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="bg-animation">
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
</div>

<nav class="navbar">
    <div class="container nav-container">
        <a href="index.html" class="logo">
            <div class="logo-box"><span>SS</span></div>
            <div class="logo-text">
                <span class="brand">Tools Hub</span>
                <span class="tagline">Premium Excel Tools</span>
            </div>
        </a>
        <ul class="nav-menu" id="navMenu">
            <li><a href="index.html">Home</a></li>
            <li><a href="tools.html">Tools</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="cart.html" class="active nav-cart-link">
                <i class="fas fa-shopping-cart"></i> Cart 
                <span class="nav-cart-badge">0</span>
            </a></li>
            <li><a href="https://wa.me/919038338852" class="btn-nav">
                <i class="fab fa-whatsapp"></i> WhatsApp
            </a></li>
        </ul>
        <button class="dark-mode-toggle" onclick="toggleDarkMode()">
            <i class="fas fa-moon"></i>
        </button>
        <div class="menu-toggle" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
    </div>
</nav>

<section class="section" style="padding-top: 120px;">
    <div class="container">
        <h1 style="text-align: center; font-size: 42px; margin-bottom: 12px;">
            🛒 Your <span class="gradient-text">Cart</span>
        </h1>
        <p style="text-align: center; color: #718096; margin-bottom: 40px;">Review your order before checkout</p>
        
        <div id="cartContainer"></div>
    </div>
</section>

<footer class="footer">
    <div class="container">
        <div class="footer-bottom" style="border-top: none;">
            <p>© 2025 SS Tools Hub. Made with ❤️ by <strong>Shiwendu</strong></p>
        </div>
    </div>
</footer>

<script src="tools-data.js"></script>
<script>
function toggleMenu() {
    document.getElementById('navMenu').classList.toggle('active');
}

function renderCart() {
    const cart = getCart();
    const container = document.getElementById('cartContainer');
    
    if (cart.length === 0) {
        container.innerHTML = `
            <div class="empty-cart">
                <div class="empty-cart-icon">🛒</div>
                <h2>Your Cart is Empty</h2>
                <p>Add some amazing tools to get started!</p>
                <a href="tools.html" class="btn btn-primary btn-large">
                    <i class="fas fa-rocket"></i> Browse Tools
                </a>
            </div>
        `;
        return;
    }
    
    const subtotal = cart.reduce((sum, item) => sum + item.price, 0);
    const oldTotal = cart.reduce((sum, item) => sum + item.oldPrice, 0);
    const savings = oldTotal - subtotal;
    
    let discount = 0;
    if (appliedCoupon) {
        if (appliedCoupon.type === 'percent') {
            discount = Math.round(subtotal * appliedCoupon.discount / 100);
        } else {
            discount = appliedCoupon.discount;
        }
    }
    
    const total = subtotal - discount;
    
    const itemsHTML = cart.map(item => `
        <div class="cart-item">
            <div class="cart-item-image" style="background: ${item.gradient};">
                <i class="${item.icon}"></i>
            </div>
            <div class="cart-item-details">
                <h3>${item.name}</h3>
                <div class="cart-item-category">${item.category}</div>
                <div class="cart-item-pricing-row">
                    <span class="price-old">₹${item.oldPrice.toLocaleString('en-IN')}</span>
                    <span class="price-new">₹${item.price.toLocaleString('en-IN')}</span>
                </div>
            </div>
            <button onclick="removeFromCart(${item.id})" class="btn-remove">
                <i class="fas fa-trash"></i> Remove
            </button>
        </div>
    `).join('');
    
    container.innerHTML = `
        <div class="cart-layout">
            <div class="cart-items-section">
                <div class="cart-section-header">
                    <h2>Cart Items (${cart.length})</h2>
                    <button onclick="clearCart()" class="btn-clear-cart">
                        <i class="fas fa-trash"></i> Clear All
                    </button>
                </div>
                ${itemsHTML}
                <a href="tools.html" class="btn-continue-shopping">
                    <i class="fas fa-arrow-left"></i> Continue Shopping
                </a>
            </div>
            
            <div class="cart-summary">
                <div class="summary-card">
                    <h3>Order Summary</h3>
                    <div class="summary-row">
                        <span>Original Price:</span>
                        <span>₹${oldTotal.toLocaleString('en-IN')}</span>
                    </div>
                    <div class="summary-row">
                        <span>Discount:</span>
                        <span class="discount-amount">-₹${savings.toLocaleString('en-IN')}</span>
                    </div>
                    <div class="summary-row">
                        <span>Subtotal:</span>
                        <span>₹${subtotal.toLocaleString('en-IN')}</span>
                    </div>
                    
                    <div class="coupon-section">
                        <input type="text" id="couponInput" placeholder="Enter coupon code">
                        <button onclick="applyCoupon()">Apply</button>
                    </div>
                    <div id="couponMessage"></div>
                    
                    ${appliedCoupon ? `
                        <div class="summary-row">
                            <span>Coupon (${appliedCoupon.code}):</span>
                            <span class="discount-amount">-₹${discount.toLocaleString('en-IN')}</span>
                        </div>
                    ` : ''}
                    
                    <div class="summary-row total-row">
                        <span>Total:</span>
                        <span>₹${total.toLocaleString('en-IN')}</span>
                    </div>
                    
                    <button onclick="checkoutWhatsApp()" class="btn-checkout">
                        <i class="fab fa-whatsapp"></i> Checkout via WhatsApp
                    </button>
                    
                    <div class="trust-badges">
                        <div class="trust-badge">
                            <i class="fas fa-shield-alt"></i>
                            <span>Secure</span>
                        </div>
                        <div class="trust-badge">
                            <i class="fas fa-undo"></i>
                            <span>30-Day Refund</span>
                        </div>
                        <div class="trust-badge">
                            <i class="fas fa-bolt"></i>
                            <span>Instant</span>
                        </div>
                    </div>
                </div>
                
                <div style="background: white; padding: 20px; border-radius: 16px; margin-top: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.08);">
                    <h4 style="margin-bottom: 12px;">🎁 Available Coupons:</h4>
                    <div style="font-size: 13px; color: #718096; line-height: 1.8;">
                        <strong>FLASH50</strong> - 50% Flash Sale<br>
                        <strong>WELCOME10</strong> - 10% off first order<br>
                        <strong>BULK20</strong> - 20% off on 2+ tools<br>
                        <strong>BUNDLE30</strong> - 30% off on 3+ tools<br>
                        <strong>MEGA50</strong> - ₹5000 off above ₹15000
                    </div>
                </div>
            </div>
        </div>
    `;
}

document.addEventListener('DOMContentLoaded', renderCart);

window.addEventListener('scroll', () => {
    const navbar = document.querySelector('.navbar');
    if (window.scrollY > 50) navbar.classList.add('scrolled');
    else navbar.classList.remove('scrolled');
});
</script>

</body>
</html>
